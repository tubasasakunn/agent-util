name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve tag / version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Build agent binary
        run: |
          set -euo pipefail
          OUT_DIR="dist/agent_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "${OUT_DIR}"
          BIN_NAME="agent${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "${OUT_DIR}/${BIN_NAME}" ./cmd/agent/
          # Bundle license and changelog for users.
          cp LICENSE README.md CHANGELOG.md "${OUT_DIR}/" || true
          ARCHIVE="agent_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip -r "${ARCHIVE}.zip" "agent_${{ matrix.goos }}_${{ matrix.goarch }}")
            echo "asset=dist/${ARCHIVE}.zip" >> "$GITHUB_ENV"
          else
            (cd dist && tar -czf "${ARCHIVE}.tar.gz" "agent_${{ matrix.goos }}_${{ matrix.goarch }}")
            echo "asset=dist/${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.asset }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag / version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Pull the section for this version out of CHANGELOG.md (Keep a Changelog format).
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for matching against ## [0.1.0] - YYYY-MM-DD style headers.
          STRIPPED="${VERSION#v}"
          NOTES_FILE="$(mktemp)"
          awk -v ver="${STRIPPED}" '
            /^## \[/ {
              if (capture) { exit }
              if ($0 ~ "\\[" ver "\\]") { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md > "${NOTES_FILE}" || true
          if [ ! -s "${NOTES_FILE}" ]; then
            echo "Release ${VERSION}." > "${NOTES_FILE}"
          fi
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: dist/**/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
