<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ai-agent — Browser Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>ai-agent <span class="muted">browser demo</span></h1>
      <div class="model-pick">
        <label>
          Model
          <select id="model-select">
            <option value="Qwen2.5-0.5B-Instruct-q4f16_1-MLC">Qwen 2.5 0.5B q4f16 (~400MB, 最軽量)</option>
            <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama 3.2 1B q4f16 (~700MB)</option>
            <option value="gemma-4-E2B-it-q4f16_1-MLC" selected>Gemma 4 E2B q4f16 (~1.3GB, 最新・推奨)</option>
            <option value="gemma-2-2b-it-q4f16_1-MLC-1k">Gemma 2 2B q4f16 1k-ctx (~1.4GB)</option>
            <option value="gemma-2-2b-it-q4f16_1-MLC">Gemma 2 2B q4f16 (~1.5GB)</option>
            <option value="gemma-2-2b-jpn-it-q4f16_1-MLC">Gemma 2 2B JPN q4f16 (~1.5GB, 日本語特化)</option>
            <option value="Llama-3.2-3B-Instruct-q4f16_1-MLC">Llama 3.2 3B q4f16 (~2GB)</option>
          </select>
        </label>
        <button id="load-btn">Load model</button>
        <label class="deep-research-toggle" title="複数ソースから情報を集めて構造化レポートを返すモード">
          <input type="checkbox" id="deep-research-toggle" />
          🔍 Deep Research
        </label>
      </div>
    </header>

    <main class="layout">
      <section class="chat-pane">
        <div id="status" class="status">
          Pick a model and click <strong>Load model</strong>. First load downloads the
          weights into your browser&rsquo;s IndexedDB cache; subsequent loads are instant.
        </div>
        <progress id="progress" max="1" value="0" hidden></progress>

        <div id="chat" class="chat" aria-live="polite"></div>

        <form id="input-form" class="input-row">
          <textarea
            id="prompt"
            placeholder="Ask the agent... (e.g. &ldquo;What is 17 + 25?&rdquo; or &ldquo;Echo: hi&rdquo;)"
            rows="2"
            disabled
          ></textarea>
          <button id="send-btn" type="submit" disabled>Send</button>
        </form>
      </section>

      <aside class="side">
        <h2>Tools</h2>
        <ul id="tool-list" class="tool-list"></ul>

        <h2>Guards</h2>
        <ul id="guard-list" class="guard-list"></ul>

        <h2>Trace</h2>
        <ol id="trace" class="trace"></ol>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
